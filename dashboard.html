<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — 0FUMO</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="dashboard-body">

  <nav class="topbar">
    <span class="brand">🚭 0FUMO</span>
    <div class="topbar-actions">
      <span id="welcomeMsg"></span>
      <button class="btn-sm btn-danger-sm" onclick="logout()">Sair</button>
    </div>
  </nav>

  <main class="main-content">

    <!-- Assessment banner (shown when assessmentCompleted = false) -->
    <div class="banner" id="assessmentBanner" style="display:none">
      <strong>⚠️ Avaliação inicial pendente</strong>
      As funcionalidades da plataforma ficam disponíveis após a conclusão da avaliação inicial.
      <br/><a href="/assessment.html" style="color:#664d03;font-weight:600;">Iniciar avaliação →</a>
    </div>

    <!-- Quick actions -->
    <div class="profile-card" id="actionsCard" style="display:none">
      <h2>Ações</h2>
      <a href="/eventos.html" class="btn" style="display:inline-block;text-decoration:none;">Registrar evento</a>
    </div>

    <!-- Profile card -->
    <div class="profile-card">
      <h2>Meu perfil</h2>

      <div id="alertProfile" class="alert" style="display:none"></div>

      <div class="profile-field">
        <label>Nome</label>
        <span id="displayName">—</span>
      </div>
      <div class="profile-field">
        <label>E-mail</label>
        <span id="displayEmail">—</span>
      </div>
      <div class="profile-field">
        <label>Membro desde</label>
        <span id="displayCreatedAt">—</span>
      </div>

      <hr class="divider" />

      <h2>Editar dados</h2>

      <form id="editForm" novalidate>
        <div class="form-group">
          <label for="editName">Nome</label>
          <input type="text" id="editName" />
          <span class="field-error" id="editNameError"></span>
        </div>
        <div class="form-group">
          <label for="editEmail">E-mail</label>
          <input type="email" id="editEmail" />
          <span class="field-error" id="editEmailError"></span>
        </div>
        <button type="submit" class="btn-outline" id="saveBtn">Salvar alterações</button>
      </form>

      <div class="delete-zone">
        <p>Zona de perigo — esta ação é irreversível.</p>
        <button class="btn-delete" onclick="confirmDelete()">Excluir minha conta</button>
      </div>
    </div>

  </main>

  <script src="/js/api.js"></script>
  <script>
    if (!getToken()) location.href = '/login.html';
    const cachedUser = getUser();
    if (cachedUser && !cachedUser.assessmentCompleted) location.href = '/assessment.html';

    let currentUser = getUser();

    function logout() {
      clearSession();
      location.href = '/login.html';
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function renderUser(user) {
      currentUser = user;
      localStorage.setItem('user', JSON.stringify(user));

      document.getElementById('welcomeMsg').textContent = 'Olá, ' + user.name;
      document.getElementById('displayName').textContent = user.name;
      document.getElementById('displayEmail').textContent = user.email;
      document.getElementById('displayCreatedAt').textContent = formatDate(user.createdAt);
      document.getElementById('editName').value = user.name;
      document.getElementById('editEmail').value = user.email;

      const banner = document.getElementById('assessmentBanner');
      banner.style.display = user.assessmentCompleted ? 'none' : 'block';

      const actionsCard = document.getElementById('actionsCard');
      actionsCard.style.display = user.assessmentCompleted ? 'block' : 'none';
    }

    function showProfileAlert(msg, type = 'danger') {
      const el = document.getElementById('alertProfile');
      el.textContent = msg;
      el.className = 'alert alert-' + type;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    function clearFieldErrors() {
      ['editName', 'editEmail'].forEach(f => {
        document.getElementById(f).classList.remove('error');
        const err = document.getElementById(f + 'Error');
        err.textContent = '';
        err.classList.remove('visible');
      });
    }

    function showFieldError(field, msg) {
      document.getElementById(field).classList.add('error');
      const err = document.getElementById(field + 'Error');
      err.textContent = msg;
      err.classList.add('visible');
    }

    // Load fresh data from API
    async function loadProfile() {
      try {
        const user = await Users.me();
        renderUser(user);
      } catch {
        // use cached
        if (currentUser) renderUser(currentUser);
      }
    }

    // Edit form
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearFieldErrors();

      const name  = document.getElementById('editName').value.trim();
      const email = document.getElementById('editEmail').value.trim();

      if (!name)  { showFieldError('editName',  'Nome é obrigatório');  return; }
      if (!email) { showFieldError('editEmail', 'E-mail é obrigatório'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('editEmail', 'E-mail inválido'); return; }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Salvando…';

      try {
        const updated = await Users.update(currentUser.id, name, email);
        renderUser(updated);
        showProfileAlert('Dados atualizados com sucesso!', 'success');
      } catch (err) {
        if (err.status === 409) {
          showFieldError('editEmail', err.body.error || 'E-mail já utilizado');
        } else if (err.status === 400 && err.body) {
          const map = { name: 'editName', email: 'editEmail' };
          Object.entries(err.body).forEach(([f, msg]) => { if (map[f]) showFieldError(map[f], msg); });
        } else {
          showProfileAlert('Erro ao salvar. Tente novamente.');
        }
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Salvar alterações';
      }
    });

    // Delete account
    async function confirmDelete() {
      if (!confirm('Tem certeza? Sua conta será excluída permanentemente.')) return;
      try {
        await Users.delete(currentUser.id);
        clearSession();
        location.href = '/register.html';
      } catch {
        showProfileAlert('Erro ao excluir conta. Tente novamente.');
      }
    }

    loadProfile();
  </script>
</body>
</html>
