<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — 0FUMO</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="card">
    <div class="card-logo">
      <h1>0FUMO</h1>
      <p>Crie sua conta e comece sua jornada</p>
    </div>

    <div id="alert" class="alert alert-danger"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="Seu nome completo" autocomplete="name" />
        <span class="field-error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
        <span class="field-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
        <span class="field-error" id="passwordError"></span>
      </div>

      <button type="submit" class="btn" id="submitBtn">Criar conta</button>
    </form>

    <div class="card-footer">
      Já tem conta? <a href="/login.html">Entrar</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) location.href = '/dashboard.html';

    const form = document.getElementById('registerForm');
    const alert = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function clearErrors() {
      ['name', 'email', 'password'].forEach(f => {
        document.getElementById(f).classList.remove('error');
        const err = document.getElementById(f + 'Error');
        err.textContent = '';
        err.classList.remove('visible');
      });
      alert.textContent = '';
      alert.classList.remove('visible');
    }

    function showFieldError(field, msg) {
      document.getElementById(field).classList.add('error');
      const err = document.getElementById(field + 'Error');
      err.textContent = msg;
      err.classList.add('visible');
    }

    function showAlert(msg) {
      alert.textContent = msg;
      alert.classList.add('visible');
    }

    function validateLocally(name, email, password) {
      let valid = true;
      if (!name.trim()) { showFieldError('name', 'Nome é obrigatório'); valid = false; }
      if (!email.trim()) { showFieldError('email', 'E-mail é obrigatório'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('email', 'E-mail inválido'); valid = false; }
      if (!password) { showFieldError('password', 'Senha é obrigatória'); valid = false; }
      else if (password.length < 8) { showFieldError('password', 'Senha deve ter no mínimo 8 caracteres'); valid = false; }
      return valid;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const name     = document.getElementById('name').value;
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!validateLocally(name, email, password)) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Cadastrando…';

      try {
        const data = await Auth.register(name, email, password);
        saveSession(data);
        location.href = '/assessment.html';
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Criar conta';

        if (err.status === 400 && err.body) {
          const map = { name: 'nameError', email: 'emailError', password: 'passwordError' };
          Object.entries(err.body).forEach(([field, msg]) => {
            if (map[field]) showFieldError(field, msg);
          });
        } else if (err.status === 409) {
          showFieldError('email', err.body.error || 'E-mail já utilizado');
        } else {
          showAlert('Erro ao realizar cadastro. Tente novamente.');
        }
      }
    });
  </script>
</body>
</html>
