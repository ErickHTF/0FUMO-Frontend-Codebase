<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — 0FUMO</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="card">
    <div class="card-logo">
      <span class="icon">🚭</span>
      <h1>0FUMO</h1>
      <p>Entre na sua conta</p>
    </div>

    <div id="alert" class="alert alert-danger"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
        <span class="field-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" />
        <span class="field-error" id="passwordError"></span>
      </div>

      <button type="submit" class="btn" id="submitBtn">Entrar</button>
    </form>

    <div class="card-footer">
      Não tem conta? <a href="/register.html">Cadastre-se</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (getToken()) location.href = '/dashboard.html';

    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function clearErrors() {
      ['email', 'password'].forEach(f => {
        document.getElementById(f).classList.remove('error');
        const err = document.getElementById(f + 'Error');
        err.textContent = '';
        err.classList.remove('visible');
      });
      alertEl.textContent = '';
      alertEl.classList.remove('visible');
    }

    function showFieldError(field, msg) {
      document.getElementById(field).classList.add('error');
      const err = document.getElementById(field + 'Error');
      err.textContent = msg;
      err.classList.add('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) { showFieldError('email', 'E-mail é obrigatório'); return; }
      if (!password) { showFieldError('password', 'Senha é obrigatória'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando…';

      try {
        const data = await Auth.login(email, password);
        saveSession(data);
        location.href = '/dashboard.html';
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';

        if (err.status === 401) {
          alertEl.textContent = 'E-mail ou senha inválidos';
          alertEl.classList.add('visible');
        } else if (err.status === 400 && err.body) {
          Object.entries(err.body).forEach(([field, msg]) => showFieldError(field, msg));
        } else {
          alertEl.textContent = 'Erro ao entrar. Tente novamente.';
          alertEl.classList.add('visible');
        }
      }
    });
  </script>
</body>
</html>
